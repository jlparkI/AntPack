name: Build

on: workflow_dispatch


jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, windows-latest]

    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.ANTPACK_PRIVATE_CLONE }}
          submodules: true

      # Used to host cibuildwheel
      - uses: actions/setup-python@v5

      - name: Install cibuildwheel
        run: |
          python -m pip install --upgrade pip
          python -m pip install cibuildwheel nanobind scikit-build-core
      
      - name: Dependencies for mac
        if: runner.os == 'macOS'
        run: |
          brew install llvm
      
      - name: Build wheels for Mac
        if: runner.os == 'macOS'
        env:
          CIBW_SKIP: "cp38-* cp37-* cp36-* *-musllinux*"
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-* cp313-* cp314-*"
        run: |
          export CC=$(brew --prefix llvm)/bin/clang
          export CXX=$(brew --prefix llvm)/bin/clang++
          export MACOSX_DEPLOYMENT_TARGET=11.0
          export CMAKE_ARGS="-DCMAKE_OSX_DEPLOYMENT_TARGET=11.0"
          python -m cibuildwheel --output-dir wheelhouse

      - name: Build wheels for all except Mac
        if: runner.os != 'macOS'
        env:
          CIBW_SKIP: "cp38-* cp37-* cp36-* *-musllinux*"
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-* cp313-* cp314-*"
        run: python -m cibuildwheel --output-dir wheelhouse

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}-${{ matrix.python }}
          path: ./wheelhouse/*.whl
